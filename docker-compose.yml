services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: keycloak/keycloak:26.1.3
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  authentication-service:
    build:
      context: ./authentication-service
    environment:
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/demo
      KEYCLOAK_CLIENT_ID: demo-client
      KEYCLOAK_CLIENT_SECRET: demo-secret
      SERVER_PORT: 8081
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
    ports:
      - "8081:8081"
    depends_on:
      - discovery-server
      - keycloak

  catalog-data-service:
    build:
      context: ./catalog-data-service
    container_name: catalog-data-service
    environment:
      SERVER_PORT: 8082
      DB_HOST: catalog-postgres
      DB_PORT: 5432
      DB_USERNAME: catalog
      DB_PASSWORD: catalog
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/demo
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
    ports:
      - "8082:8082"
    depends_on:
      discovery-server:
        condition: service_started
      catalog-postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    restart: on-failure

  catalog-cache-service:
    build:
      context: ./catalog-cache-service
    container_name: catalog-cache-service
    environment:
      SERVER_PORT: 8083
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CATALOG_DATA_SERVICE_URL: http://catalog-data-service:8082
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/demo
      EUREKA_DEFAULT_ZONE: http://discovery-server:8761/eureka/
    ports:
      - "8083:8083"
    depends_on:
      discovery-server:
        condition: service_started
      redis:
        condition: service_healthy
      catalog-data-service:
        condition: service_started
      keycloak:
        condition: service_started

  catalog-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: catalog
      POSTGRES_PASSWORD: catalog
    volumes:
      - catalog_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  discovery-server:
    build:
      context: ./discovery-server
    container_name: discovery-server
    environment:
      SERVER_PORT: 8761
      EUREKA_INSTANCE_HOSTNAME: discovery-server
    ports:
      - "8761:8761"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  catalog_pgdata: