spring:
  application:
    name: catalog-data-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/catalog
    username: ${DB_USERNAME:catalog}
    password: ${DB_PASSWORD:catalog}
    jpa:
      hibernate:
        ddl-auto: validate
    flyway:
      enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/demo}
server:
  port: ${SERVER_PORT:8082}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true