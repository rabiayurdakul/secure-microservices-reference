spring:
  application:
    name: authentication-service

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/demo}
      client:
        registration:
          keycloak-client:
            client-id: ${KEYCLOAK_CLIENT_ID:demo-client}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:changeme}
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          keycloak-client:
            token-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/demo}/protocol/openid-connect/token

server:
  port: ${SERVER_PORT:8081}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    org.springframework.security: DEBUG

keycloak:
  resource-id: demo-client
  principal-attribute: preferred_username

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true