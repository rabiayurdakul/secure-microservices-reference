spring:
  application:
    name: catalog-cache-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

catalog:
  data-service:
    base-url: ${CATALOG_DATA_SERVICE_URL:http://localhost:8082}
  cache:
    ttl-seconds: ${CACHE_TTL_SECONDS:300}

server:
  port: ${SERVER_PORT:8083}

management:
  endpoints:
    web:
      exposure:
        include: health,info

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true